<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Comparasion Table</title>
</head>
<body>
    <header>
        <h1 class="title">Acme Plans</h1>
    </header>
    <nav>
        <span>Home</span>   
        <span>About</span>  
        <span>Contact</span>
    </nav>
    <main>
        <table>
            <caption>Plan Comparation</caption>
            <thead>
                <tr>
                    <th scope="col">Plan</th>
                    <th scope="col">Storage</th>
                    <th scope="col">Projects</th>
                    <th scope="col">Support</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="col">Free</th>
                    <td scope="row">5GB</td>
                    <td scope="row">3</td>
                    <td scope="row">Email</td>
                </tr>
                <tr>
                    <th scope="col">Pro</th>
                    <td scope="row">100GB</td>
                    <td scope="row">25</td>
                    <td scope="row">Priority Email</td>
                </tr>
                <tr>
                    <th scope="col">Business</th>
                    <td scope="row">1TB</td>
                    <td scope="row">Unlimited</td>
                    <td scope="row">24/7 Phone</td>
                </tr>
                <tr>
                    <td colspan="4">All plans include SSL and daily backups</td>
                </tr>
            </tbody>
        </table>
    </main>
    <footer>All rights reserved 2026</footer>
</body>
</html>
